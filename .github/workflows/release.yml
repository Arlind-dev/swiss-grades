name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new_release_published: ${{ steps.semantic-release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semantic-release.outputs.new_release_git_tag }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "arlind-bot[bot]"
          git config user.email "${{ vars.APP_ID }}+arlind-bot[bot]@users.noreply.github.com"

      - name: Run semantic-release
        id: semantic-release
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/github
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            conventional-changelog-conventionalcommits
            github:Arlind-dev/verified-git-commit
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: "arlind-bot[bot]"
          GIT_COMMITTER_NAME: "arlind-bot[bot]"
          GIT_AUTHOR_EMAIL: "${{ vars.APP_ID }}+arlind-bot[bot]@users.noreply.github.com"
          GIT_COMMITTER_EMAIL: "${{ vars.APP_ID }}+arlind-bot[bot]@users.noreply.github.com"

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read

    needs: [release]
    if: needs.release.outputs.new_release_published == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.new_release_git_tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: cp svelte.config.docker.js svelte.config.js && bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    needs: [release, build]

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/386
          - linux/amd64
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64/v8
          - linux/ppc64le
          - linux/riscv64
          - linux/s390x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.new_release_git_tag }}
          sparse-checkout: Dockerfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.new_release_version }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform == 'linux/386' && '386' || matrix.platform == 'linux/amd64' && 'amd64' || matrix.platform == 'linux/arm/v6' && 'arm-v6' || matrix.platform == 'linux/arm/v7' && 'arm-v7' || matrix.platform == 'linux/arm64/v8' && 'arm64-v8' || matrix.platform == 'linux/ppc64le' && 'ppc64le' || matrix.platform == 'linux/riscv64' && 'riscv64' || 's390x' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    needs: [release, docker]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.new_release_version }}

      - name: Create and push multi-platform manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

  cloudflare:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    permissions:
      contents: read

    needs: [release]

    steps:
      - name: Trigger deploy hook
        run: curl -X POST "${{ secrets.CF_DEPLOY_HOOK_URL }}"
