name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "arlind-bot[bot]"
          git config user.email "${{ vars.APP_ID }}+arlind-bot[bot]@users.noreply.github.com"

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/github
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            conventional-changelog-conventionalcommits
            github:Arlind-dev/verified-git-commit
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: "arlind-bot[bot]"
          GIT_COMMITTER_NAME: "arlind-bot[bot]"
          GIT_AUTHOR_EMAIL: "${{ vars.APP_ID }}+arlind-bot[bot]@users.noreply.github.com"
          GIT_COMMITTER_EMAIL: "${{ vars.APP_ID }}+arlind-bot[bot]@users.noreply.github.com"
