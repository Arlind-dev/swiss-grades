<!doctype html>
<html lang="de" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      try {
        var t = localStorage.getItem('swiss-grades-theme');
        var theme = (t === 'mocha' || t === 'latte') ? t : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'mocha' : 'latte');
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.background = theme === 'mocha' ? '#1E1E2E' : '#EFF1F5';
        var l = localStorage.getItem('swiss-grades-locale');
        if (l === 'de' || l === 'en' || l === 'fr' || l === 'it') document.documentElement.lang = l;
      } catch(e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
